<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Patreon Code</title>
</head>
<body>
  <h2>Patreon Login Successful!</h2>

  <p>Copy the code below and paste it into the app:</p>

  <input type="text" id="patreonCode" style="width: 100%;" readonly>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      document.getElementById("patreonCode").value = code;
    } else {
      document.body.innerHTML = "No Patreon code received. Try logging in again.";
    }
  </script>
</body>
</html>
